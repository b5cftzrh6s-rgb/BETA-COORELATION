
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Control Correlation Tool v2.0</title>

https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body { font-family: system-ui; background:#0a0a0a; color:#fff; padding:20px; }
.container { max-width:1400px; margin:auto; }
.card { background:#111; padding:20px; border-radius:16px; margin-bottom:20px; border:1px solid #222; }
.section-title { color:#00d4ff; font-weight:600; margin-bottom:10px; }
button { background:#00d4ff; color:#000; padding:10px 20px; border-radius:999px; border:none; cursor:pointer; }
select,input { width:100%; padding:8px; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:8px; }
.chart { height:350px; }
</style>
</head>

<body>
<div class="container">
<h1>Shell Control Tool v2.0</h1>

<div class="card">
<div class="section-title">Upload CSV</div>
<input type="file" id="fileInput">
</div>

<div id="controls" class="card" style="display:none;">
<div class="section-title">Column Mapping</div>
<select id="dateCol"></select>
<select id="manualCol"></select>
<select id="sensorCol"></select>
<select id="cupType">
<option value="">Select Cup</option>
<option value="EZ-Zahn4">EZ-Zahn #4</option>
<option value="EZ-Zahn5">EZ-Zahn #5</option>
<option value="ISO6">ISO #6</option>
<option value="ISO8">ISO #8</option>
</select>
<button onclick="process()">Process</button>
</div>

<div id="results" class="card" style="display:none;">
<div class="section-title">Best Model</div>
<div id="bestModel"></div>
<canvas id="chart"></canvas>
</div>

</div>

<script>
// =========================
// STATE
// =========================
let rows = [];
let headers = [];
let data = [];

// =========================
// CUP FORMULAS (UNCHANGED)
// =========================
function cSt(sec, type){
if(!sec) return null;
switch(type){
case "EZ-Zahn4": return 13.26*sec - (673/sec);
case "EZ-Zahn5": return 23.56*sec - (744/sec);
case "ISO6": return 6.9*sec - (570/sec);
case "ISO8": return 21.78*sec - (306/sec);
}
}

// =========================
// CSV LOAD (ROBUST)
// =========================
document.getElementById('fileInput').addEventListener('change', e=>{
Papa.parse(e.target.files[0], {
complete: res=>{
let r = res.data;

// auto-detect header row
let idx = [14,13,15].find(i =>
r[i] && r[i].some(x=>String(x).toLowerCase().includes("date"))
);

headers = r[idx];
rows = r.slice(idx+1);

let selects = ["dateCol","manualCol","sensorCol"];
selects.forEach(id=>{
let sel = document.getElementById(id);
sel.innerHTML="";
headers.forEach((h,i)=>{
let o=new Option(h,i);
sel.add(o);
});
});

document.getElementById("controls").style.display="block";
}
});
});

// =========================
// MAIN PROCESS
// =========================
function process(){
let d = parseInt(dateCol.value);
let m = parseInt(manualCol.value);
let s = parseInt(sensorCol.value);
let type = cupType.value;

data = [];

rows.forEach(r=>{
let sec = parseFloat(r[m]);
let sensor = parseFloat(r[s]);

if(!sec || !sensor || sensor<0) return;

let calc = cSt(sec,type);
data.push({x:sec,y:sensor,p:calc});
});

// run models
let models = runModels(data.map(d=>d.x), data.map(d=>d.y));
let best = models.sort((a,b)=>b.r2-a.r2)[0];

document.getElementById("bestModel").innerHTML =
"Best: "+best.name+" | R²="+best.r2.toFixed(3);

renderChart(data, models);

document.getElementById("results").style.display="block";
}

// =========================
// MODELS
// =========================
function runModels(x,y){
let models=[];

// linear
let lin = linear(x,y);
models.push({name:"Linear", fn:lin.fn, r2:lin.r2});

// poly2
let p2 = poly(x,y,2);
models.push({name:"Poly2", fn:p2.fn, r2:p2.r2});

// exponential
let exp = exponential(x,y);
models.push({name:"Exp", fn:exp.fn, r2:exp.r2});

// log
let logm = logModel(x,y);
models.push({name:"Log", fn:logm.fn, r2:logm.r2});

// power
let pow = power(x,y);
models.push({name:"Power", fn:pow.fn, r2:pow.r2});

return models;
}

// =========================
// LINEAR
// =========================
function linear(x,y){
let n=x.length;
let sx=0,sy=0,sxy=0,sx2=0;

for(let i=0;i<n;i++){
sx+=x[i]; sy+=y[i];
sxy+=x[i]*y[i];
sx2+=x[i]*x[i];
}

let m=(n*sxy-sx*sy)/(n*sx2-sx*sx);
let b=(sy-m*sx)/n;

let fn = x=>m*x+b;
return {fn,r2:r2(x,y,fn)};
}

// =========================
// POLY
// =========================
function poly(x,y,d){
let n=x.length;
let X=[],Y=[];

for(let i=0;i<n;i++){
let row=[];
for(let j=0;j<=d;j++) row.push(Math.pow(x[i],j));
X.push(row);
Y.push(y[i]);
}

// normal eq solve
let XT = mathTranspose(X);
let XT_X = mathMultiply(XT,X);
let XT_Y = mathMultiply(XT,Y);

let coef = solve(XT_X, XT_Y);

let fn = x=>{
let sum=0;
coef.forEach((c,i)=> sum+=c*Math.pow(x,i));
return sum;
};

return {fn, r2:r2(x,y,fn)};
}

// =========================
// EXP / LOG / POWER
// =========================
function exponential(x,y){
let X=[],Y=[];
for(let i=0;i<x.length;i++){
if(y[i]>0){ X.push(x[i]); Y.push(Math.log(y[i])); }
}
let lin = linear(X,Y);
return {
fn: x=>Math.exp(lin.fn(x)),
r2:r2(x,y,x=>Math.exp(lin.fn(x)))
};
}

function logModel(x,y){
let X=[],Y=[];
for(let i=0;i<x.length;i++){
if(x[i]>0){ X.push(Math.log(x[i])); Y.push(y[i]); }
}
let lin = linear(X,Y);
return {
fn: x=>lin.fn(Math.log(x)),
r2:r2(x,y,x=>lin.fn(Math.log(x)))
};
}

function power(x,y){
let X=[],Y=[];
for(let i=0;i<x.length;i++){
if(x[i]>0 && y[i]>0){
X.push(Math.log(x[i]));
Y.push(Math.log(y[i]));
}
}
let lin = linear(X,Y);
return {
fn: x=>Math.exp(lin.fn(Math.log(x))),
r2:r2(x,y,x=>Math.exp(lin.fn(Math.log(x))))
};
}

// =========================
// R2
// =========================
function r2(x,y,f){
let mean = y.reduce((a,b)=>a+b,0)/y.length;
let ssr=0,sst=0;
for(let i=0;i<x.length;i++){
let pred=f(x[i]);
ssr+=(y[i]-pred)**2;
sst+=(y[i]-mean)**2;
}
return 1-ssr/sst;
}

// =========================
// MATRIX HELPERS
// =========================
function mathTranspose(A){
return A[0].map((_,i)=>A.map(r=>r[i]));
}
function mathMultiply(A,B){
let result=[];
for(let i=0;i<A.length;i++){
result[i]=[];
for(let j=0;j<B[0].length;j++){
let sum=0;
for(let k=0;k<A[0].length;k++) sum+=A[i][k]*B[k][j];
result[i][j]=sum;
}
}
return result;
}
function solve(A,b){
let n=A.length;
for(let i=0;i<n;i++){
let max=i;
for(let j=i+1;j<n;j++){
if(Math.abs(A[j][i])>Math.abs(A[max][i])) max=j;
}
[A[i],A[max]]=[A[max],A[i]];
[b[i],b[max]]=[b[max],b[i]];

for(let j=i+1;j<n;j++){
let factor=A[j][i]/A[i][i];
for(let k=i;k<n;k++) A[j][k]-=factor*A[i][k];
b[j]-=factor*b[i];
}
}

let x=new Array(n);
for(let i=n-1;i>=0;i--){
x[i]=b[i];
for(let j=i+1;j<n;j++) x[i]-=A[i][j]*x[j];
x[i]/=A[i][i];
}
return x;
}

// =========================
// CHART
// =========================
function renderChart(data, models){
let ctx=document.getElementById("chart");

new Chart(ctx,{
type:"scatter",
data:{
datasets:[
{
label:"Data",
data:data,
backgroundColor:"#00d4ff"
},
...models.map(m=>({
type:"line",
label:m.name,
data:data.map(p=>({x:p.x,y:m.fn(p.x)})),
borderColor:"#0f0",
fill:false
}))
]
}
});
}
</script>

</body>
</html>
